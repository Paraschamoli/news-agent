id: news-agents-v1
name: news-agents
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  Multi-agent news aggregation system that fetches RSS feeds from 6 sources,
  categorizes stories, and generates structured markdown summaries with trend analysis.

# Tags and Modes
tags:
  - news-aggregation
  - rss-processing
  - multi-agent
  - content-analysis

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json
  - text/markdown

# Example Queries
examples:
  - "Generate a structured technology news briefing summarizing AI developments"
  - "Create a global business news briefing covering technology and startup ecosystem"
  - "Summarize the latest stories from all news sources"
  - "Get top trending technology news"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "RSS feed aggregation from 6 configured sources with parallel processing"
    features:
      - "Fetches from Hacker News, WSJ Tech, WSJ Markets, TechCrunch, AI News, Wired"
      - "Parallel processing using asyncio.gather"
      - "Source-specific XML parsers with namespace support"
      - "Retry logic with exponential backoff (3 attempts, 2-30s wait)"
      - "Fallback URLs for WSJ and AI News feeds"
      - "Returns up to 30 stories per source"
    limitations: "RSS feeds reflect source update schedules, not real-time"

  secondary_capability:
    supported: true
    description: "Story categorization and markdown summary generation"
    features:
      - "Category extraction from RSS metadata"
      - "Topic frequency counting using Counter"
      - "Top 10 category identification"
      - "Markdown formatted output with sections"
      - "Source distribution statistics"
    limitations: "Categories depend on RSS feed metadata quality"

# Requirements
requirements:
  packages:
    - agno
    - bindu
    - httpx
    - defusedxml
    - tenacity
    - python-dotenv
  system:
    - "Internet access for RSS fetching"
    - "OPENROUTER_API_KEY environment variable"
    - "MEM0_API_KEY environment variable"
  min_memory_mb: 512
  external_services:
    - "OpenRouter API for LLM"
    - "Mem0 API for memory (optional)"
    - "RSS feed endpoints (public)"

# Performance Metrics
performance:
  avg_processing_time_ms: 75000
  max_concurrent_requests: 6
  memory_per_request_mb: 512
  timeout_seconds: 30
  scalability: horizontal

# Tool Restrictions
allowed_tools:
  - get_rss_stories
  - get_all_rss_stories
  - categorize_stories_by_topic
  - generate_news_summary
  - create_sub_agent_task
  - process_sub_agent_task
  - coordinate_multi_agent_processing
  - Mem0Tools

# Rich Documentation
documentation:
  overview: |
    Single-agent system using OpenRouter LLM that coordinates RSS processing tools.
    Fetches from 6 hardcoded RSS sources, parses XML with source-specific parsers,
    and generates markdown summaries. Uses Bindu framework for JSON-RPC interface.

  use_cases:
    when_to_use:
      - "Technology news briefings from multiple sources"
      - "Automated news digest generation"
      - "Trend monitoring across tech news sources"

    when_not_to_use:
      - "Real-time breaking news (RSS has delays)"
      - "Non-technology news domains"
      - "Custom RSS source configuration (sources are hardcoded)"

  input_structure: |
    JSON-RPC 2.0 message with user query in parts array.

    Example:
    {
      "jsonrpc": "2.0",
      "method": "message/send",
      "params": {
        "message": {
          "role": "user",
          "parts": [{"kind": "text", "text": "Generate AI news briefing"}],
          "kind": "message",
          "messageId": "c2f5e710-5616-49ad-b187-d93cbbA00001",
          "contextId": "c2f5e710-5616-49ad-b187-d93cbbA00002",
          "taskId": "c2f5e710-5616-49ad-b187-d93cbbA00003"
        },
        "skillId": "news-agents-v1",
        "configuration": {"acceptedOutputModes": ["application/json"]}
      },
      "id": "c2f5e710-5616-49ad-b187-d93cbbA00003"
    }

  output_format: |
    JSON-RPC 2.0 result with task status and markdown formatted news summary.

    Success Response (submitted):
    {
      "jsonrpc": "2.0",
      "id": "c2f5e710-5616-49ad-b187-d93cbba00003",
      "result": {
        "id": "c2f5e710-5616-49ad-b187-d93cbba00003",
        "kind": "task",
        "status": {"state": "submitted", "timestamp": "2026-03-11T03:59:06.621730+00:00"},
        "history": [{"role": "user", "parts": [{"kind": "text", "text": "..."}]}]
      }
    }

    Success Response (completed):
    {
      "jsonrpc": "2.0",
      "result": {
        "status": {"state": "completed"},
        "history": [
          {"role": "user", "parts": [{"kind": "text", "text": "..."}]},
          {"role": "assistant", "parts": [{"kind": "text", "text": "# Multi-Agent News Summary..."}]}
        ],
        "artifacts": [{"name": "result", "parts": [{"kind": "text", "text": "Markdown summary"}]}]
      }
    }

  error_handling:
    - "RSS fetch failures: Retry 3 times with exponential backoff"
    - "WSJ/AI News failures: Try fallback URLs"
    - "Parser errors: Skip source and continue with others"
    - "Partial failures: Return results from successful sources"
    - "HTTP timeouts: 30 second limit per request"

  examples:
    - title: "AI Technology News Briefing"
      input:
        parts:
          - kind: "text"
            text: "Generate a structured technology news briefing summarizing AI developments"
      output:
        text: |
          # Multi-Agent News Summary: AI and Technology Developments 🌐

          ## Executive Overview 📊
          In a dynamic week for artificial intelligence, the technology landscape continues to evolve...

          ## Key Highlights 🔍
          ### Research and Funding
          - **Landmark AI Research Investment**: Yann LeCun secures $1 billion...

          ## Emerging Trends 📈
          1. AI Contextual Understanding
          2. Multilingual AI Deployment

  best_practices:
    for_developers:
      - "Agent uses coordinate_multi_agent_processing for full workflow"
      - "All RSS fetches use httpx.AsyncClient with 30s timeout"
      - "XML parsing uses defusedxml for security"
      - "Errors logged to stderr via logging module"

    for_orchestrators:
      - "Route technology news aggregation requests to this skill"
      - "Expect 60-120 second processing time"
      - "Task returns 'submitted' immediately, poll tasks/get for completion"
      - "Supports text/plain and application/json output modes"
      - "Agent generates markdown by default"

  installation: |
    Environment variables required:
    OPENROUTER_API_KEY=<your-key>
    MEM0_API_KEY=<your-key>

    Run:
    python -m news_agent.main --model anthropic/claude-3.5-haiku

    Default model: anthropic/claude-3.5-haiku
    Server runs on port 3773 (configured in agent_config.json)

  versioning:
    - version: "1.0.0"
      date: "2026-03-11"
      changes: "Initial release with 6-source RSS aggregation"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "news"
    - "briefing"
    - "technology"
    - "AI"
    - "startup"
    - "trending"
    - "summary"

  specializations:
    - domain: "news-aggregation"
      confidence_boost: 0.3
    - domain: "technology-news"
      confidence_boost: 0.2

  anti_patterns:
    - "Real-time chat conversations"
    - "Non-technology news domains"
    - "Custom RSS source configuration"
    - "Historical news analysis beyond RSS feed retention"

  complexity_indicators:
    simple:
      - "Get latest tech news"
      - "Summarize news from all sources"
    medium:
      - "Generate structured AI news briefing"
      - "Create business news briefing with sections"
    complex:
      - "Deep trend analysis with cross-source correlation"
      - "Multi-topic comparative analysis"
